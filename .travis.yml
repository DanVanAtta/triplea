language: java
jdk:
- oraclejdk8
install: true
script:
- gradle test
before_deploy:
- echo "Setting up git and pushing a tag to trigger a release"
- git config --global user.email "tripleabuilderbot@gmail.com"
- git config --global user.name "tripleabuilderbot"
- export TAGGED_VERSION="$BUILD_VERSION.$TRAVIS_BUILD_NUMBER"
- git tag $TAGGED_VERSION -a -m "$TAGGED_VERSION"
- echo 'git push -q https://$GITHUB_PERSONAL_ACCESS_TOKEN_FOR_TRAVIS@github.com/triplea-game/triplea --tags'
- echo "Installing Install4j"
- wget http://github.com/triplea-game/assets/blob/master/install4j/install4j_unix_6_0_4.sh
- chmod +x install4j_unix_6_0_4.sh
- ./install4j_unix_6_0_4.sh -q
- wget http://github.com/triplea-game/assets/blob/master/install4j/jre-8u66-macosx-x64.tar.gz
- mv jre-8u66-macosx-x64.tar.gz ~/install4j6/jres
- wget http://github.com/triplea-game/assets/blob/master/install4j/jre-8u66-windows-x64.tar.gz
- mv jre-8u66-windows-x64.tar.gz ~/install4j6/jres
- mkdir -p ~/.gradle
- grep -q "install4jHomeDir" ~/.gradle/gradle.properties 2> /dev/null || echo "install4jHomeDir=$(cd ~ && pwd)/install4j6" >> ~/.gradle/gradle.properties
- ~/install4j6/bin/install4jc -L $INSTALL4J_LICENSE
- gradle release
- echo "showing build folder contents"
- find build
deploy:
  provider: releases
  api_key:
    secure: 
  file:
    - build/libs/triplea-all.jar
#    - build/releases/triplea_unix_.sh
  skip_cleanup: true
  on:
    tags: true
    repo: DanVanAtta/triplea
